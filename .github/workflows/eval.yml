name: GDPR Agent Evaluation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install databricks-sdk pandas
        pip install "typing_extensions>=4.9.0"
        pip install databricks-vectorsearch "langgraph>=0.2.0" "langchain-openai>=0.2.0" openai
    
    - name: Run Evaluation
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        python -m eval_harness.cli \
          --endpoint gdpr-agent-endpoint \
          --dataset evaluation_data/golden_set_v3_production_30.json \
          --threshold 0.90 \
          --output evaluation_results.csv \
          --report evaluation_report.txt
    
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results
        path: |
          evaluation_results.csv
          evaluation_report.txt
    
    - name: Comment PR with Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('evaluation_report.txt', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📊 GDPR Agent Evaluation Results\n\n\`\`\`\n${report}\n\`\`\``
          });
