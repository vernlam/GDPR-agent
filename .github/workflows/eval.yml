name: GDPR Agent Evaluation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'gdpr_agent/**'
      - 'evaluation_data/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'gdpr_agent/**'
      - 'evaluation_data/**'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pass_rate: ${{ steps.get_pass_rate.outputs.pass_rate }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install databricks-sdk pandas mlflow
        pip install "typing_extensions>=4.9.0"
        pip install databricks-vectorsearch "langgraph>=0.2.0" "langchain-openai>=0.2.0" openai
    
    - name: Run Evaluation
      id: run_eval
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        MLFLOW_TRACKING_URI: databricks
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python -m eval_harness.cli \
          --dataset evaluation_data/golden_set_v3_production_30.json \
          --threshold 0.90 \
          --experiment "/Shared/gdpr-agent-ci-evaluation" \
          --output evaluation_results.csv \
          --report evaluation_report.txt
      # Note: This step will fail (exit 1) if evaluation fails
      # No continue-on-error, so job will fail immediately
    
    - name: Extract Pass Rate
      id: get_pass_rate
      if: always()
      run: |
        if [ -f evaluation_results.csv ]; then
          PASS_RATE=$(python -c "import pandas as pd; df = pd.read_csv('evaluation_results.csv'); print(df['passed'].mean())" 2>/dev/null || echo "0")
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "Pass rate: $PASS_RATE"
        else
          echo "pass_rate=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Check Evaluation Threshold
      if: always()
      run: |
        PASS_RATE=${{ steps.get_pass_rate.outputs.pass_rate }}
        THRESHOLD=0.90
        
        echo "Pass Rate: $PASS_RATE"
        echo "Threshold: $THRESHOLD"
        
        # Use Python for reliable float comparison
        PASSED=$(python -c "print('true' if float('$PASS_RATE') >= $THRESHOLD else 'false')")
        
        if [ "$PASSED" = "false" ]; then
          echo "❌ Evaluation FAILED: $PASS_RATE < $THRESHOLD"
          echo "::error::Evaluation pass rate ($PASS_RATE) is below threshold ($THRESHOLD)"
          exit 1
        else
          echo "✅ Evaluation PASSED: $PASS_RATE >= $THRESHOLD"
        fi
    
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results
        path: |
          evaluation_results.csv
          evaluation_report.txt
    
    - name: Comment PR with Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let report = "Evaluation results not available";
          try {
            if (fs.existsSync('evaluation_report.txt')) {
              report = fs.readFileSync('evaluation_report.txt', 'utf8');
            }
          } catch (error) {
            report = `Error reading report: ${error.message}`;
          }
          
          const passRate = "${{ steps.get_pass_rate.outputs.pass_rate }}";
          const threshold = "0.90";
          const passed = parseFloat(passRate) >= parseFloat(threshold);
          const emoji = passed ? "✅" : "❌";
          const status = passed ? "PASSED" : "FAILED";
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ${emoji} GDPR Agent Evaluation Results - ${status}

**Pass Rate:** ${(parseFloat(passRate) * 100).toFixed(1)}% (Threshold: ${(parseFloat(threshold) * 100).toFixed(1)}%)

\`\`\`
${report}
\`\`\``
          });

  trigger-staging:
    needs: evaluate
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Staging Deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'staging-deploy.yml',
              ref: 'main',
              inputs: {
                commit_sha: '${{ github.sha }}',
                pass_rate: '${{ needs.evaluate.outputs.pass_rate }}'
              }
            });
            console.log('✅ Triggered staging deployment workflow');
